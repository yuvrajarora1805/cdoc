
services:
  mysql:
    image: mysql:8.0
    container_name: license_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_pass
      MYSQL_DATABASE: license_db
      MYSQL_USER: license_user
      MYSQL_PASSWORD: license_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: license_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: license_user
      DB_PASSWORD: license_pass
      DB_NAME: license_db
      JWT_SECRET: super_secret_jwt_key_change_in_production
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: license_frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data:
